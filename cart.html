<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سلة الطلب</title>
  <link rel="icon" href="imgs/ico img.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style_cart.css">

</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Kawkab <span>ALs3ada</span></a>
      <div class="header-actions">
        <nav class="main-nav" id="mainNav">
          <a href="index.html#hero" class="nav-link">الرئيسية</a>
          <a href="index.html#menu" class="nav-link">المنيو</a>
          <a href="index.html#contact" class="nav-link">تواصل معنا</a>
        </nav>
        <a class="cart-link" href="cart.html" aria-label="عرض السلة">
          <span class="cart-icon" aria-hidden="true">🛒</span>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="cart-page" id="cartPage">
    <section class="menu-section">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow">سلتك</p>
          <h2 class="section-title">الطلبات الموجودة</h2>
        </div>

        <div id="emptyCart" class="empty-cart">
          السلة فارغة الآن. ارجع للمنيو واضغط "أضف إلى السلة".
        </div>

        <div id="cartItems" class="cart-list"></div>

        <div class="cart-summary">
          <span>الإجمالي:</span>
          <strong id="cartTotal">0</strong>
          <span>ج.م</span>
        </div>

        <div class="cart-actions" style="display:flex;gap:12px;justify-content:flex-end;align-items:center;">
          <a href="index.html" class="btn btn-ghost">العودة للمنيو</a>
          <button id="completeOrderBtn" class="btn btn-primary">إتمام الطلب</button>
        </div>

        <!-- Order Modal -->
        <div id="orderModal" class="modal-overlay" aria-hidden="true">
          <div class="modal" role="dialog" aria-modal="true" aria-labelledby="orderModalTitle">
            <button id="closeOrderModal" class="modal-close" aria-label="إغلاق">×</button>
            <h3 id="orderModalTitle">بيانات العميل لإتمام الطلب</h3>
            <form id="orderForm" novalidate>
              <div class="form-row">
                <label for="customerName">اسم العميل</label>
                <input type="text" id="customerName" name="customerName" required />
                <small class="error" id="errName"></small>
              </div>

              <div class="form-row">
                <label for="customerPhone">رقم الهاتف</label>
                <input type="tel" id="customerPhone" name="customerPhone" pattern="[0-9+\-() ]+" required />
                <small class="error" id="errPhone"></small>
              </div>

              <div class="form-row">
                <label for="customerAddress">العنوان</label>
                <textarea id="customerAddress" name="customerAddress" rows="3" required></textarea>
                <small class="error" id="errAddress"></small>
              </div>

              <div class="form-row">
                <label for="customerNotes">ملاحظات (اختياري)</label>
                <textarea id="customerNotes" name="customerNotes" rows="2"></textarea>
              </div>

              <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">
                <button type="button" id="cancelOrderBtn" class="btn btn-ghost">إلغاء</button>
                <button type="submit" class="btn btn-primary">إتمام الطلب</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Kawkab ALs3ada. جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script src="JS/main.js"></script>
  <script src="JS/main_cart.js"></script>
</body>
</html>
